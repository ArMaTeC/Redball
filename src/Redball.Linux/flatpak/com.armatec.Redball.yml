app-id: com.armatec.Redball
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: redball
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.gnome.SettingsDaemon
  - --talk-name=org.freedesktop.DBus
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.Settings
  - --env=XDG_CURRENT_DESKTOP=GNOME
  # For idle inhibition portal
  - --env=XDG_SESSION_TYPE=wayland
  # System tray
  - --talk-name=com.canonical.indicator.application
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.kde.StatusNotifierWatcher
  # D-Bus for screensaver/idle
  - --talk-name=org.freedesktop.login1
  - --own-name=com.armatec.Redball
  # For TypeThing functionality
  - --talk-name=org.freedesktop.at-spi.bus
  - --socket=session-bus

modules:
  - name: python3-pygobject
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app PyGObject
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/source/P/PyGObject/PyGObject-3.48.2.tar.gz
        sha256: c3c0a7afbe5a0b06e3d270babc8d2c7f234e5c9b1f38c9f5d2c3d3e0b0a1c2d3
    
  - name: redball
    builddir: true
    buildsystem: meson
    sources:
      - type: dir
        path: .
        skip:
          - .git
          - flatpak
          - tests
