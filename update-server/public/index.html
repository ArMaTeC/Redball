<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redball Update Server</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23e53935'/></svg>">
  <style>
    :root {
      --bg: #0f1117;
      --bg-card: #161822;
      --bg-hover: #1c1f2e;
      --border: #2a2d3e;
      --text: #e4e4e7;
      --text-dim: #8b8fa3;
      --accent: #e53935;
      --accent-hover: #f44336;
      --green: #4caf50;
      --blue: #42a5f5;
      --orange: #ff9800;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: white;
      box-shadow: 0 0 16px rgba(229, 57, 53, 0.3);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header h1 span {
      color: var(--text-dim);
      font-weight: 400;
      font-size: 14px;
      margin-left: 8px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Main content */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-left { display: flex; gap: 8px; align-items: center; }

    .channel-filter {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .channel-btn {
      padding: 8px 16px;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .channel-btn.active {
      background: var(--accent);
      color: white;
    }

    .channel-btn:hover:not(.active) {
      background: var(--bg-hover);
      color: var(--text);
    }

    /* Buttons */
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--bg-hover); }

    .btn-danger {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-danger:hover { background: rgba(229, 57, 53, 0.1); }

    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* Release cards */
    .releases { display: flex; flex-direction: column; gap: 12px; }

    .release-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .release-card:hover { border-color: var(--accent); }

    .release-header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .release-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .release-version {
      font-size: 18px;
      font-weight: 600;
    }

    .release-badge {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-stable { background: rgba(76, 175, 80, 0.15); color: var(--green); }
    .badge-beta { background: rgba(255, 152, 0, 0.15); color: var(--orange); }
    .badge-dev { background: rgba(66, 165, 245, 0.15); color: var(--blue); }

    .release-meta {
      display: flex;
      gap: 16px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .release-meta svg { width: 14px; height: 14px; opacity: 0.6; }

    .release-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px 20px;
    }

    .release-card.expanded .release-body { display: block; }

    .release-notes {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .release-notes:empty::after {
      content: 'No release notes.';
      font-style: italic;
      opacity: 0.5;
    }

    /* Files table */
    .files-table {
      width: 100%;
      border-collapse: collapse;
    }

    .files-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    .files-table td {
      padding: 8px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    .files-table tr:last-child td { border-bottom: none; }

    .files-table .filename {
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--blue);
    }

    .files-table .hash {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-dim);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .files-table a {
      color: var(--accent);
      text-decoration: none;
    }

    .files-table a:hover { text-decoration: underline; }

    .release-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow);
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea { min-height: 80px; resize: vertical; }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(229, 57, 53, 0.05);
      color: var(--text);
    }

    .drop-zone input { display: none; }

    .upload-list {
      margin-top: 12px;
      font-size: 13px;
    }

    .upload-list .file-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      color: var(--text-dim);
    }

    /* Progress */
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      width: 0;
      transition: width 0.3s;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { margin-bottom: 20px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-size: 14px;
      box-shadow: var(--shadow);
      z-index: 300;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--accent); }

    /* Responsive */
    @media (max-width: 768px) {
      .header { flex-direction: column; gap: 12px; }
      .stats-bar { gap: 16px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .release-header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .release-meta { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">R</div>
      <h1>Redball Update Server <span id="server-version">v1.0</span></h1>
    </div>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="stat-releases">0</div>
        <div class="stat-label">Releases</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-files">0</div>
        <div class="stat-label">Files</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-downloads">0</div>
        <div class="stat-label">Downloads</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-latest">—</div>
        <div class="stat-label">Latest</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="channel-filter">
          <button class="channel-btn active" data-channel="all">All</button>
          <button class="channel-btn" data-channel="stable">Stable</button>
          <button class="channel-btn" data-channel="beta">Beta</button>
          <button class="channel-btn" data-channel="dev">Dev</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="showNewReleaseModal()">+ New Release</button>
    </div>

    <div id="releases-list" class="releases">
      <div class="empty-state">
        <h3>No releases yet</h3>
        <p>Create your first release to start hosting update files.</p>
        <button class="btn btn-primary" onclick="showNewReleaseModal()">+ New Release</button>
      </div>
    </div>
  </div>

  <!-- New Release Modal -->
  <div class="modal-overlay" id="new-release-modal">
    <div class="modal">
      <h2>Create New Release</h2>
      <div class="form-group">
        <label>Version</label>
        <input type="text" id="new-version" placeholder="e.g. 2.1.444">
      </div>
      <div class="form-group">
        <label>Channel</label>
        <select id="new-channel">
          <option value="stable">Stable</option>
          <option value="beta">Beta</option>
          <option value="dev">Dev</option>
        </select>
      </div>
      <div class="form-group">
        <label>Release Notes</label>
        <textarea id="new-notes" placeholder="What's new in this release..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('new-release-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="createRelease()">Create Release</button>
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <h2>Upload Files to <span id="upload-version-label"></span></h2>
      <div class="drop-zone" id="drop-zone">
        <p>Drop files here or click to browse</p>
        <p style="font-size:12px;margin-top:4px;">MSI, EXE, DLL, ZIP, JSON, and other files</p>
        <input type="file" id="file-input" multiple>
      </div>
      <div class="upload-list" id="upload-list"></div>
      <div class="progress-bar" id="upload-progress" style="display:none">
        <div class="fill" id="upload-progress-fill"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('upload-modal')">Cancel</button>
        <button class="btn btn-primary" id="upload-btn" onclick="uploadFiles()" disabled>Upload</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentChannel = 'all';
    let uploadVersion = '';
    let selectedFiles = [];

    // === API ===
    async function fetchJSON(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }
      return res.json();
    }

    // === Load data ===
    async function loadStats() {
      try {
        const stats = await fetchJSON('/api/stats');
        document.getElementById('stat-releases').textContent = stats.totalReleases;
        document.getElementById('stat-files').textContent = stats.totalFiles;
        document.getElementById('stat-downloads').textContent = stats.totalDownloads;
        document.getElementById('stat-latest').textContent = stats.latestVersion === 'none' ? '—' : `v${stats.latestVersion}`;
      } catch {}
    }

    async function loadReleases() {
      try {
        const releases = await fetchJSON('/api/releases');
        renderReleases(releases);
      } catch (e) {
        showToast('Failed to load releases: ' + e.message, 'error');
      }
    }

    function renderReleases(releases) {
      const container = document.getElementById('releases-list');
      const filtered = currentChannel === 'all'
        ? releases
        : releases.filter(r => r.channel === currentChannel);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No releases found</h3>
            <p>${currentChannel !== 'all' ? `No ${currentChannel} releases yet.` : 'Create your first release to start hosting update files.'}</p>
            <button class="btn btn-primary" onclick="showNewReleaseModal()">+ New Release</button>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map(r => `
        <div class="release-card" id="release-${r.version}">
          <div class="release-header" onclick="toggleRelease('${r.version}')">
            <div class="release-header-left">
              <span class="release-version">v${r.version}</span>
              <span class="release-badge badge-${r.channel || 'stable'}">${r.channel || 'stable'}</span>
            </div>
            <div class="release-meta">
              <span>${(r.files || []).length} files</span>
              <span>${formatSize(totalSize(r))}</span>
              <span>${r.totalDownloads || 0} downloads</span>
              <span>${formatDate(r.date)}</span>
            </div>
          </div>
          <div class="release-body">
            <div class="release-notes">${escapeHtml(r.notes || '')}</div>
            ${renderFilesTable(r)}
            <div class="release-actions">
              <button class="btn btn-primary btn-sm" onclick="showUploadModal('${r.version}')">Upload Files</button>
              <button class="btn btn-secondary btn-sm" onclick="copyManifestUrl('${r.version}')">Copy Manifest URL</button>
              <button class="btn btn-secondary btn-sm" onclick="copyApiUrl('${r.version}')">Copy API URL</button>
              <button class="btn btn-danger btn-sm" onclick="deleteRelease('${r.version}')">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderFilesTable(release) {
      if (!release.files || release.files.length === 0) {
        return '<p style="color:var(--text-dim);font-size:13px;font-style:italic;">No files uploaded yet.</p>';
      }
      return `
        <table class="files-table">
          <thead>
            <tr><th>File</th><th>Size</th><th>SHA256</th><th>Downloads</th><th></th></tr>
          </thead>
          <tbody>
            ${release.files.map(f => `
              <tr>
                <td class="filename">${f.name}</td>
                <td>${formatSize(f.size)}</td>
                <td class="hash" title="${f.hash || ''}">${f.hash ? f.hash.substring(0, 16) + '...' : '—'}</td>
                <td>${f.downloads || 0}</td>
                <td><a href="/downloads/${release.version}/${f.name}">Download</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    // === Actions ===
    function toggleRelease(version) {
      const card = document.getElementById(`release-${version}`);
      card.classList.toggle('expanded');
    }

    async function createRelease() {
      const version = document.getElementById('new-version').value.trim();
      const channel = document.getElementById('new-channel').value;
      const notes = document.getElementById('new-notes').value;
      if (!version) { showToast('Version is required', 'error'); return; }

      try {
        await fetchJSON('/api/releases', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ version, channel, notes })
        });
        closeModal('new-release-modal');
        showToast(`Release v${version} created`, 'success');
        loadReleases();
        loadStats();
        document.getElementById('new-version').value = '';
        document.getElementById('new-notes').value = '';
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    async function deleteRelease(version) {
      if (!confirm(`Delete release v${version} and all its files?`)) return;
      try {
        await fetchJSON(`/api/releases/${version}`, { method: 'DELETE' });
        showToast(`Release v${version} deleted`, 'success');
        loadReleases();
        loadStats();
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    function copyManifestUrl(version) {
      const url = `${location.origin}/api/releases/${version}/manifest`;
      navigator.clipboard.writeText(url);
      showToast('Manifest URL copied', 'success');
    }

    function copyApiUrl(version) {
      const url = `${location.origin}/api/releases/${version}`;
      navigator.clipboard.writeText(url);
      showToast('API URL copied', 'success');
    }

    // === Upload ===
    function showUploadModal(version) {
      uploadVersion = version;
      selectedFiles = [];
      document.getElementById('upload-version-label').textContent = `v${version}`;
      document.getElementById('upload-list').innerHTML = '';
      document.getElementById('upload-btn').disabled = true;
      document.getElementById('upload-progress').style.display = 'none';
      openModal('upload-modal');
    }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => addFiles(fileInput.files));

    function addFiles(fileList) {
      for (const f of fileList) selectedFiles.push(f);
      const list = document.getElementById('upload-list');
      list.innerHTML = selectedFiles.map(f =>
        `<div class="file-item"><span>${f.name}</span><span>${formatSize(f.size)}</span></div>`
      ).join('');
      document.getElementById('upload-btn').disabled = selectedFiles.length === 0;
    }

    async function uploadFiles() {
      if (selectedFiles.length === 0) return;
      const form = new FormData();
      selectedFiles.forEach(f => form.append('files', f));

      document.getElementById('upload-btn').disabled = true;
      document.getElementById('upload-btn').textContent = 'Uploading...';
      document.getElementById('upload-progress').style.display = 'block';

      try {
        const xhr = new XMLHttpRequest();
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            document.getElementById('upload-progress-fill').style.width = `${(e.loaded / e.total * 100)}%`;
          }
        };
        await new Promise((resolve, reject) => {
          xhr.onload = () => xhr.status < 400 ? resolve() : reject(new Error('Upload failed'));
          xhr.onerror = () => reject(new Error('Network error'));
          xhr.open('POST', `/api/releases/${uploadVersion}/upload`);
          xhr.send(form);
        });
        closeModal('upload-modal');
        showToast(`${selectedFiles.length} file(s) uploaded`, 'success');
        loadReleases();
        loadStats();
      } catch (e) {
        showToast(e.message, 'error');
      } finally {
        document.getElementById('upload-btn').disabled = false;
        document.getElementById('upload-btn').textContent = 'Upload';
      }
    }

    // === Modals ===
    function showNewReleaseModal() { openModal('new-release-modal'); }
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('active');
      });
    });

    // === Channel filter ===
    document.querySelectorAll('.channel-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentChannel = btn.dataset.channel;
        loadReleases();
      });
    });

    // === Toast ===
    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // === Helpers ===
    function formatSize(bytes) {
      if (!bytes) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
      return `${bytes.toFixed(i > 0 ? 1 : 0)} ${units[i]}`;
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function totalSize(release) {
      return (release.files || []).reduce((s, f) => s + (f.size || 0), 0);
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // === Init ===
    loadStats();
    loadReleases();
  </script>
</body>
</html>
