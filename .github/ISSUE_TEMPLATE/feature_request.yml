---
name: Feature Request
description: Suggest a new feature for Redball
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please check existing issues first.
        
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: "It would be great if Redball could..."
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative solutions have you considered?
      
  - type: dropdown
    id: user-persona
    attributes:
      label: User Persona
      description: Which type of user would benefit most?
      options:
        - Developer (long builds/compiles)
        - Presenter (demos/screen sharing)
        - IT Admin (enterprise deployment)
        - Power User (automation/advanced)
        - General User (casual use)
    validations:
      required: true
      
  - type: checkboxes
    id: priority
    attributes:
      label: Priority
      description: How important is this to you?
      options:
        - label: "Nice to have — would use it occasionally"
        - label: "Important — would use it regularly"
        - label: "Critical — currently using a workaround"
        
  - type: checkboxes
    id: willing-to-contribute
    attributes:
      label: Contribution
      options:
        - label: I would be willing to test this feature
        - label: I would be willing to contribute code/docs
