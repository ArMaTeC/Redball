name: Build & Sign Release

on:
  push:
    branches: [ main ]
    paths:
      - 'Redball.ps1'
      - 'installer/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 2.0.2)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  tag:
    name: Auto-Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}
      tag: ${{ steps.tag.outputs.TAG }}
      created: ${{ steps.tag.outputs.CREATED }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.REDBALL_GITHUB_TOKEN }}

    - name: Extract version and create tag
      id: tag
      shell: bash
      run: |
        # Use input version if provided (manual trigger), otherwise extract from script
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          # Extract version from Redball.ps1
          VERSION=$(grep -oP "VERSION = '\K[\d.]+" Redball.ps1 || echo "2.0.0")
        fi
        
        echo "Using version: $VERSION"
        TAG="v${VERSION}"
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"
        echo "Tag will be: $TAG"

        # Check if this tag already exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists — skipping."
          echo "CREATED=false" >> "$GITHUB_OUTPUT"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
          echo "CREATED=true" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build Installer
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        dotnet tool install --global wix --version 4.0.5
        # Verify installation and add to PATH if needed
        $wixPath = Join-Path $env:USERPROFILE '.dotnet\tools'
        if ($env:PATH -notlike "*$wixPath*") {
          $env:PATH = "$wixPath;$env:PATH"
          echo "$wixPath" | Out-File -FilePath $env:GITHUB_PATH -Append
        }
        # Verify wix is accessible
        $wix = Get-Command wix.exe -ErrorAction SilentlyContinue
        if (-not $wix) {
          throw "wix.exe not found in PATH after installation"
        }
        Write-Host "WiX version: $(wix.exe --version)"

    - name: Build MSI
      shell: pwsh
      run: |
        $version = '${{ needs.tag.outputs.version }}'
        Write-Host "Building MSI for version: $version"
        & ./installer/Build-MSI.ps1 -Version $version
        if ($LASTEXITCODE -ne 0) {
          throw "MSI build failed with exit code $LASTEXITCODE"
        }
        # Verify MSI was created
        $msiPath = "./dist/Redball-$version.msi"
        if (-not (Test-Path $msiPath)) {
          $msiPath = "./dist/Redball.msi"
        }
        if (Test-Path $msiPath) {
          Write-Host "MSI created successfully: $msiPath"
          Get-Item $msiPath | Select-Object Name, Length, LastWriteTime
        } else {
          throw "MSI file not found after build"
        }

    - name: Prepare signing artifact
      shell: pwsh
      run: |
        $version = '${{ needs.tag.outputs.version }}'
        $msiSource = "./dist/Redball-$version.msi"
        if (-not (Test-Path $msiSource)) {
            $msiSource = './dist/Redball.msi'
        }
        Copy-Item $msiSource './dist/Redball.msi' -Force -ErrorAction SilentlyContinue

    - name: Upload unsigned MSI
      uses: actions/upload-artifact@v4
      id: upload-artifact
      with:
        name: redball-unsigned
        path: ./dist/Redball.msi
        retention-days: 7
        if-no-files-found: error

  sign:
    name: Sign with SignPath
    needs: [tag, build]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.created == 'true'
    continue-on-error: true

    steps:
    - name: Download unsigned artifacts
      uses: actions/download-artifact@v4
      with:
        name: redball-unsigned
        path: ./artifacts

    - name: Submit MSI for signing
      uses: signpath/github-action-submit-signing-request@v1
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '${{ secrets.SIGNPATH_ORG_ID }}'
        project-slug: 'redball'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'Redball-MSI'
        github-artifact-id: '${{ needs.build.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: './signed'
        wait-for-completion-timeout-in-seconds: 600

    - name: Upload signed artifacts
      uses: actions/upload-artifact@v4
      with:
        name: redball-signed
        path: ./signed/
        retention-days: 90

  release:
    name: Create GitHub Release
    needs: [tag, build, sign]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.created == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download unsigned artifacts (fallback)
      uses: actions/download-artifact@v4
      if: needs.sign.result == 'failure' || needs.sign.result == 'skipped'
      with:
        name: redball-unsigned
        path: ./release

    - name: Download signed artifacts
      uses: actions/download-artifact@v4
      if: needs.sign.result == 'success'
      with:
        name: redball-signed
        path: ./release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: ./release/Redball.msi
        generate_release_notes: true
        draft: false
        prerelease: false
