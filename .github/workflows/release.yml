name: Build & Sign Release

on:
  push:
    branches: [ main ]
    paths:
      - 'Redball.ps1'
      - 'installer/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 2.0.2)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  tag:
    name: Auto-Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}
      tag: ${{ steps.tag.outputs.TAG }}
      created: ${{ steps.tag.outputs.CREATED }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        token: ${{ secrets.REDBALL_GITHUB_TOKEN }}

    - name: Extract version and create tag
      id: tag
      shell: bash
      run: |
        # Use input version if provided (manual trigger), otherwise extract from script
        INPUT_VERSION="${{ github.event.inputs.version }}"
        if [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          # Extract version from Redball.ps1 - look for $script:VERSION
          VERSION=$(grep -oP '\$script:VERSION = '\''\K[\d.]+' Redball.ps1 || echo "2.0.0")
        fi
        
        echo "Using version: $VERSION"
        TAG="v${VERSION}"
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"
        echo "Tag will be: $TAG"

        # Check if this tag already exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists — skipping."
          echo "CREATED=false" >> "$GITHUB_OUTPUT"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
          echo "CREATED=true" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build Installer
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        dotnet tool install --global wix --version 4.0.5
        $wixDir = Join-Path $env:USERPROFILE '.dotnet\tools'
        echo "$wixDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $wix = Join-Path $wixDir 'wix.exe'
        & $wix extension add -g WixToolset.UI.wixext/4.0.5
        & $wix --version

    - name: Verify WiX
      run: wix --version

    - name: Publish WPF Application
      shell: pwsh
      run: |
        dotnet publish src/Redball.UI.WPF/Redball.UI.WPF.csproj --configuration Release -o dist/wpf-publish
        Write-Host "Published WPF app to dist/wpf-publish"
        Get-ChildItem dist/wpf-publish/Redball.UI.WPF.exe | Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}}

    - name: Sign EXE
      shell: pwsh
      env:
        CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
        CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
      run: |
        $exePath = "dist/wpf-publish/Redball.UI.WPF.exe"
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Sort-Object FullName -Descending | Select-Object -First 1
        if (-not $signtool) {
          Write-Warning "signtool.exe not found - skipping EXE signing"
          exit 0
        }
        Write-Host "Using signtool: $($signtool.FullName)"

        if ($env:CODE_SIGNING_CERT) {
          # Decode certificate from secret
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          $certPath = "$env:RUNNER_TEMP\code-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          Write-Host "Signing EXE with production certificate..."
          & $signtool.FullName sign /f $certPath /p $env:CODE_SIGNING_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exePath
          if ($LASTEXITCODE -ne 0) { Write-Warning "EXE signing failed (exit $LASTEXITCODE)" }
          else { Write-Host "EXE signed successfully" }
          Remove-Item $certPath -Force
        } else {
          # Create self-signed cert for development builds
          Write-Host "No CODE_SIGNING_CERT secret found - creating self-signed certificate..."
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Redball Development, O=ArMaTeC" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(1)
          $certPath = "$env:RUNNER_TEMP\dev-signing.pfx"
          $pwd = ConvertTo-SecureString -String "RedballDev2024" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $pwd | Out-Null
          & $signtool.FullName sign /f $certPath /p "RedballDev2024" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exePath
          if ($LASTEXITCODE -ne 0) { Write-Warning "EXE signing failed (exit $LASTEXITCODE)" }
          else { Write-Host "EXE signed with development certificate" }
          Remove-Item $certPath -Force
          Remove-Item "Cert:\CurrentUser\My\$($cert.Thumbprint)" -Force
        }
        # Verify signature
        & $signtool.FullName verify /pa $exePath 2>&1 | Write-Host

    - name: Debug info
      shell: bash
      run: |
        echo "Version: ${{ needs.tag.outputs.version }}"
        echo "PWD: $(pwd)"
        ls -la installer/
        ls -la dist/wpf-publish/ || echo 'wpf-publish not found'
        mkdir -p dist

    - name: Build MSI
      shell: bash
      run: |
        set +e
        VERSION="${{ needs.tag.outputs.version }}"
        cd installer
        echo "=== Building MSI v${VERSION} ==="
        wix.exe build Redball.wxs -o "../dist/Redball-${VERSION}.msi" -ext WixToolset.UI.wixext -d "ProductVersion=${VERSION}" > ../dist/wix.log 2>&1
        WIX_RC=$?
        cd ..
        echo "=== WiX exit code: ${WIX_RC} ==="
        echo "### WiX Build Log (exit ${WIX_RC})" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat dist/wix.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no log file)" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat dist/wix.log 2>/dev/null
        ls -la dist/
        echo "### dist contents" >> "$GITHUB_STEP_SUMMARY"
        ls -la dist/ >> "$GITHUB_STEP_SUMMARY"
        if [ ! -f "dist/Redball-${VERSION}.msi" ]; then
          echo "ERROR: MSI not produced (WiX exit ${WIX_RC})"
          exit 1
        fi
        cp "dist/Redball-${VERSION}.msi" "dist/Redball.msi"
        echo "OK: MSI produced ($(wc -c < dist/Redball.msi) bytes)"

    - name: Sign MSI
      shell: pwsh
      env:
        CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
        CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
      run: |
        $version = "${{ needs.tag.outputs.version }}"
        $msiPath = "dist/Redball.msi"
        if (-not (Test-Path $msiPath)) {
          Write-Warning "MSI not found at $msiPath - skipping signing"
          exit 0
        }
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Sort-Object FullName -Descending | Select-Object -First 1
        if (-not $signtool) {
          Write-Warning "signtool.exe not found - skipping MSI signing"
          exit 0
        }

        if ($env:CODE_SIGNING_CERT) {
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          $certPath = "$env:RUNNER_TEMP\code-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          Write-Host "Signing MSI with production certificate..."
          & $signtool.FullName sign /f $certPath /p $env:CODE_SIGNING_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 /d "Redball v$version" $msiPath
          if ($LASTEXITCODE -ne 0) { Write-Warning "MSI signing failed (exit $LASTEXITCODE)" }
          else { Write-Host "MSI signed successfully" }
          Remove-Item $certPath -Force
        } else {
          Write-Host "No CODE_SIGNING_CERT secret - creating self-signed certificate for MSI..."
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Redball Development, O=ArMaTeC" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(1)
          $certPath = "$env:RUNNER_TEMP\dev-signing.pfx"
          $pwd = ConvertTo-SecureString -String "RedballDev2024" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $pwd | Out-Null
          & $signtool.FullName sign /f $certPath /p "RedballDev2024" /tr http://timestamp.digicert.com /td sha256 /fd sha256 /d "Redball v$version" $msiPath
          if ($LASTEXITCODE -ne 0) { Write-Warning "MSI signing failed (exit $LASTEXITCODE)" }
          else { Write-Host "MSI signed with development certificate" }
          Remove-Item $certPath -Force
          Remove-Item "Cert:\CurrentUser\My\$($cert.Thumbprint)" -Force
        }
        & $signtool.FullName verify /pa $msiPath 2>&1 | Write-Host

    - name: Upload MSI
      id: upload
      uses: actions/upload-artifact@v5
      with:
        name: redball-msi
        path: ./dist/Redball.msi
        retention-days: 7
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.created == 'true' && needs.build.result == 'success'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Download MSI
      uses: actions/download-artifact@v5
      with:
        name: redball-msi
        path: ./release

    - name: Verify MSI exists
      shell: bash
      run: |
        ls -la ./release/
        if [ ! -f "./release/Redball.msi" ]; then
          echo "ERROR: Redball.msi not found"
          exit 1
        fi
        echo "MSI ready for release"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: ./release/Redball.msi
        generate_release_notes: true
        draft: false
        prerelease: false
