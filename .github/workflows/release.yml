name: Build & Sign Release

on:
  push:
    branches: [ main ]
    paths:
      - 'Redball.ps1'
      - 'installer/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 2.0.2)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  tag:
    name: Auto-Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}
      tag: ${{ steps.tag.outputs.TAG }}
      created: ${{ steps.tag.outputs.CREATED }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.REDBALL_GITHUB_TOKEN }}

    - name: Extract version and create tag
      id: tag
      shell: bash
      run: |
        # Use input version if provided (manual trigger), otherwise extract from script
        INPUT_VERSION="${{ github.event.inputs.version }}"
        if [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          # Extract version from Redball.ps1 - look for $script:VERSION
          VERSION=$(grep -oP '\$script:VERSION = '\''\K[\d.]+' Redball.ps1 || echo "2.0.0")
        fi
        
        echo "Using version: $VERSION"
        TAG="v${VERSION}"
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"
        echo "Tag will be: $TAG"

        # Check if this tag already exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists — skipping."
          echo "CREATED=false" >> "$GITHUB_OUTPUT"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
          echo "CREATED=true" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build Installer
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        dotnet tool install --global wix --version 4.0.5
        $wixDir = Join-Path $env:USERPROFILE '.dotnet\tools'
        echo "$wixDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $wix = Join-Path $wixDir 'wix.exe'
        & $wix extension add -g WixToolset.UI.wixext
        & $wix --version

    - name: Verify WiX
      run: wix --version

    - name: Debug info
      shell: bash
      run: |
        echo "Version: ${{ needs.tag.outputs.version }}"
        echo "PWD: $(pwd)"
        ls -la installer/
        mkdir -p dist

    - name: Build MSI
      shell: bash
      run: |
        VERSION="${{ needs.tag.outputs.version }}"
        cd installer
        echo "=== Building MSI v${VERSION} ==="
        wix.exe build Redball.wxs \
          -o "../dist/Redball-${VERSION}.msi" \
          -ext WixToolset.UI.wixext \
          -d "ProductVersion=${VERSION}" > ../dist/wix-stdout.log 2> ../dist/wix-stderr.log
        WIX_EXIT=$?
        cd ..
        echo "=== WiX exit code: ${WIX_EXIT} ==="
        echo "=== WiX stdout ==="
        cat dist/wix-stdout.log || true
        echo "=== WiX stderr ==="
        cat dist/wix-stderr.log || true
        if [ $WIX_EXIT -ne 0 ]; then
          echo "ERROR: WiX build failed with exit code ${WIX_EXIT}"
          exit 1
        fi
        echo "=== Build output ==="
        ls -la dist/
        # Verify no external cab files (cab must be embedded in MSI)
        if ls dist/*.cab 2>/dev/null; then
          echo "ERROR: External cab files found - EmbedCab not working!"
          exit 1
        fi
        echo "OK: No external cab files (embedded in MSI)"
        cp "dist/Redball-${VERSION}.msi" "dist/Redball.msi"
        echo "MSI size: $(wc -c < dist/Redball.msi) bytes"

    - name: Upload unsigned MSI
      uses: actions/upload-artifact@v4
      with:
        name: redball-unsigned
        path: ./dist/Redball.msi
        retention-days: 7
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.created == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download unsigned MSI
      uses: actions/download-artifact@v4
      with:
        name: redball-unsigned
        path: ./release

    - name: Verify MSI exists
      shell: bash
      run: |
        ls -la ./release/
        if [ ! -f "./release/Redball.msi" ]; then
          echo "ERROR: Redball.msi not found"
          exit 1
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: ./release/Redball.msi
        generate_release_notes: true
        draft: false
        prerelease: false
