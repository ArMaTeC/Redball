name: Build & Sign Release

on:
  push:
    branches: [ main ]
    paths:
      - 'Redball.ps1'
      - 'installer/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 2.0.2)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  tag:
    name: Auto-Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}
      tag: ${{ steps.tag.outputs.TAG }}
      created: ${{ steps.tag.outputs.CREATED }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.REDBALL_GITHUB_TOKEN }}

    - name: Extract version and create tag
      id: tag
      shell: bash
      run: |
        # Use input version if provided (manual trigger), otherwise extract from script
        INPUT_VERSION="${{ github.event.inputs.version }}"
        if [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          # Extract version from Redball.ps1 - look for $script:VERSION
          VERSION=$(grep -oP '\$script:VERSION = '\''\K[\d.]+' Redball.ps1 || echo "2.0.0")
        fi
        
        echo "Using version: $VERSION"
        TAG="v${VERSION}"
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"
        echo "Tag will be: $TAG"

        # Check if this tag already exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists — skipping."
          echo "CREATED=false" >> "$GITHUB_OUTPUT"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
          echo "CREATED=true" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build Installer
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        Write-Host "=== Installing WiX Toolset ==="
        
        # Install WiX toolset
        dotnet tool install --global wix --version 4.0.5
        if ($LASTEXITCODE -ne 0) { throw "Failed to install WiX toolset" }
        
        # Get the WiX path
        $wixDir = "$env:USERPROFILE\.dotnet\tools"
        $wixExe = "$wixDir\wix.exe"
        
        Write-Host "=== WiX installed at: $wixExe ==="
        
        # Add to PATH for current session
        $env:PATH = "$wixDir;$env:PATH"
        
        # Verify wix.exe exists
        if (-not (Test-Path $wixExe)) {
          throw "wix.exe not found at expected path: $wixExe"
        }
        
        # Check WiX version
        Write-Host "=== WiX Version ==="
        & $wixExe --version
        
        # Install required WiX extensions
        Write-Host "=== Installing WiX Extensions ==="
        & $wixExe extension add -g WixToolset.UI.wixext
        if ($LASTEXITCODE -ne 0) { Write-Warning "Extension install may have issues, continuing..." }
        
        # List installed extensions
        Write-Host "=== Installed WiX Extensions ==="
        & $wixExe extension list -g
        
        Write-Host "=== WiX Setup Complete ==="

    - name: Build MSI
      shell: pwsh
      run: |
        $version = '${{ needs.tag.outputs.version }}'
        Write-Host "=== Building MSI for version: $version ==="
        
        # Ensure dist directory exists
        New-Item -ItemType Directory -Path './dist' -Force | Out-Null
        Write-Host "=== Dist directory ready ==="
        
        # Check what files we have
        Write-Host "=== Files in installer directory ==="
        Get-ChildItem ./installer/ | Select-Object Name
        
        # Run the build script with explicit WiX path
        $wixDir = "$env:USERPROFILE\.dotnet\tools"
        Write-Host "=== Running Build-MSI.ps1 with WixBinPath: $wixDir ==="
        
        & ./installer/Build-MSI.ps1 -Version $version -WixBinPath $wixDir
        
        Write-Host "=== Build script completed with exit code: $LASTEXITCODE ==="
        
        # Check what was created
        Write-Host "=== Contents of dist directory ==="
        Get-ChildItem ./dist/ -ErrorAction SilentlyContinue | Select-Object Name, Length
        
        # Verify MSI was created
        $msiPaths = @(
          "./dist/Redball-$version.msi",
          "./dist/Redball.msi"
        )
        $found = $false
        foreach ($path in $msiPaths) {
          if (Test-Path $path) {
            Write-Host "✓ Found MSI at: $path"
            $found = $true
            Copy-Item $path './dist/Redball.msi' -Force
            break
          }
        }
        if (-not $found) {
          Write-Error "❌ MSI file not found after build"
          exit 1
        }
        Write-Host "✓ MSI build complete"

    - name: Upload unsigned MSI
      uses: actions/upload-artifact@v4
      with:
        name: redball-unsigned
        path: ./dist/Redball.msi
        retention-days: 7
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.created == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download unsigned MSI
      uses: actions/download-artifact@v4
      with:
        name: redball-unsigned
        path: ./release

    - name: Verify MSI exists
      shell: bash
      run: |
        ls -la ./release/
        if [ ! -f "./release/Redball.msi" ]; then
          echo "ERROR: Redball.msi not found"
          exit 1
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: ./release/Redball.msi
        generate_release_notes: true
        draft: false
        prerelease: false
