name: Build & Sign Release

on:
  push:
    branches: [ main ]
    paths:
      - 'Redball.ps1'
      - 'installer/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 2.0.2)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  tag:
    name: Auto-Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}
      tag: ${{ steps.tag.outputs.TAG }}
      created: ${{ steps.tag.outputs.CREATED }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        token: ${{ secrets.REDBALL_GITHUB_TOKEN }}

    - name: Extract version and create tag
      id: tag
      shell: bash
      run: |
        # Use input version if provided (manual trigger), otherwise extract from script
        INPUT_VERSION="${{ github.event.inputs.version }}"
        if [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          # Extract version from Redball.ps1 - look for $script:VERSION
          VERSION=$(grep -oP '\$script:VERSION = '\''\K[\d.]+' Redball.ps1 || echo "2.0.0")
        fi
        
        echo "Using version: $VERSION"
        TAG="v${VERSION}"
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"
        echo "Tag will be: $TAG"

        # Check if this tag already exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists — skipping."
          echo "CREATED=false" >> "$GITHUB_OUTPUT"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
          echo "CREATED=true" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build Installer
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        dotnet tool install --global wix --version 4.0.5
        $wixDir = Join-Path $env:USERPROFILE '.dotnet\tools'
        echo "$wixDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $wix = Join-Path $wixDir 'wix.exe'
        & $wix extension add -g WixToolset.UI.wixext/4.0.5
        & $wix --version

    - name: Verify WiX
      run: wix --version

    - name: Publish WPF Application
      shell: pwsh
      run: |
        dotnet publish src/Redball.UI.WPF/Redball.UI.WPF.csproj --configuration Release -o dist/wpf-publish
        Write-Host "Published WPF app to dist/wpf-publish"
        Get-ChildItem dist/wpf-publish/Redball.UI.WPF.exe | Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}}

    - name: Debug info
      shell: bash
      run: |
        echo "Version: ${{ needs.tag.outputs.version }}"
        echo "PWD: $(pwd)"
        ls -la installer/
        ls -la dist/wpf-publish/ || echo 'wpf-publish not found'
        mkdir -p dist

    - name: Build MSI
      shell: bash
      run: |
        set +e
        VERSION="${{ needs.tag.outputs.version }}"
        cd installer
        echo "=== Building MSI v${VERSION} ==="
        wix.exe build Redball.wxs -o "../dist/Redball-${VERSION}.msi" -ext WixToolset.UI.wixext -d "ProductVersion=${VERSION}" > ../dist/wix.log 2>&1
        WIX_RC=$?
        cd ..
        echo "=== WiX exit code: ${WIX_RC} ==="
        echo "### WiX Build Log (exit ${WIX_RC})" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat dist/wix.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no log file)" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat dist/wix.log 2>/dev/null
        ls -la dist/
        echo "### dist contents" >> "$GITHUB_STEP_SUMMARY"
        ls -la dist/ >> "$GITHUB_STEP_SUMMARY"
        if [ ! -f "dist/Redball-${VERSION}.msi" ]; then
          echo "ERROR: MSI not produced (WiX exit ${WIX_RC})"
          exit 1
        fi
        cp "dist/Redball-${VERSION}.msi" "dist/Redball.msi"
        echo "OK: MSI produced ($(wc -c < dist/Redball.msi) bytes)"

    - name: Upload unsigned MSI
      id: upload
      uses: actions/upload-artifact@v5
      with:
        name: redball-unsigned
        path: ./dist/Redball.msi
        retention-days: 7
        if-no-files-found: error

  sign:
    name: Sign MSI
    needs: [tag, build]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.created == 'true'
    continue-on-error: true
    permissions:
      id-token: write
      actions: read
    outputs:
      signed: ${{ steps.sign.outcome == 'success' && 'true' || 'false' }}

    steps:
    - name: Submit signing request to SignPath
      id: sign
      uses: signpath/github-action-submit-signing-request@v1
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '54610b87-ea22-4e3b-90ae-34fba7b90267'
        project-slug: 'redball'
        signing-policy-slug: 'redball'
        artifact-configuration-slug: 'Redball-MSI'
        github-artifact-id: '${{ needs.build.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: './signed'
        wait-for-completion-timeout-in-seconds: 600

    - name: Upload signed MSI
      if: steps.sign.outcome == 'success'
      uses: actions/upload-artifact@v5
      with:
        name: redball-signed
        path: ./signed/Redball.msi
        retention-days: 7
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [tag, build, sign]
    runs-on: ubuntu-latest
    if: always() && needs.tag.outputs.created == 'true' && needs.build.result == 'success'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Download signed MSI
      if: needs.sign.outputs.signed == 'true'
      uses: actions/download-artifact@v5
      with:
        name: redball-signed
        path: ./release

    - name: Download unsigned MSI (fallback)
      if: needs.sign.outputs.signed != 'true'
      uses: actions/download-artifact@v5
      with:
        name: redball-unsigned
        path: ./release

    - name: Verify MSI exists
      shell: bash
      run: |
        ls -la ./release/
        SIGNED="${{ needs.sign.outputs.signed == 'true' && 'SIGNED' || 'UNSIGNED' }}"
        echo "MSI is ${SIGNED}"
        if [ ! -f "./release/Redball.msi" ]; then
          echo "ERROR: Redball.msi not found"
          exit 1
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: ./release/Redball.msi
        generate_release_notes: true
        draft: false
        prerelease: false
