name: Build & Sign Release

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'installer/**'
      - '.github/workflows/release.yml'
      - '*.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 2.1.25)'
        required: false
        default: ''
      force_build:
        description: 'Force build even if tag exists'
        required: false
        default: 'false'

permissions:
  contents: write
  id-token: write
  actions: read

env:
  # Opt into Node.js 24 to suppress deprecation warnings until actions are updated
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    name: Auto-Tag Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}
      tag: ${{ steps.tag.outputs.TAG }}
      created: ${{ steps.tag.outputs.CREATED }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.REDBALL_GITHUB_TOKEN }}

    - name: Extract version and create tag
      id: tag
      shell: bash
      run: |
        # Use input version if provided (manual trigger), otherwise extract from csproj
        INPUT_VERSION="${{ github.event.inputs.version }}"
        FORCE_BUILD="${{ github.event.inputs.force_build }}"
        if [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          # Extract version from WPF project file
          VERSION=$(grep -oP '<Version>\K[\d.]+' src/Redball.UI.WPF/Redball.UI.WPF.csproj || echo "2.1.25")
        fi
        
        echo "Using version: $VERSION"
        TAG="v${VERSION}"
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"
        echo "Tag will be: $TAG"

        # Check if this tag already exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists"
          if [ "$FORCE_BUILD" == "true" ]; then
            echo "Force build enabled - will rebuild existing tag"
            echo "CREATED=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping build - use force_build=true to rebuild"
            echo "CREATED=false" >> "$GITHUB_OUTPUT"
          fi
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
          echo "CREATED=true" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build Installer
    needs: tag
    # Run if: (1) new tag was created, OR (2) manual run with force_build=true, OR (3) manual run with version input
    if: |
      always() && 
      (needs.tag.outputs.created == 'true' || 
       github.event.inputs.force_build == 'true' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''))
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        dotnet tool install --global wix --version 4.0.5
        $wixDir = Join-Path $env:USERPROFILE '.dotnet\tools'
        echo "$wixDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $wix = Join-Path $wixDir 'wix.exe'
        & $wix extension add -g WixToolset.UI.wixext/4.0.5
        & $wix extension add -g WixToolset.Util.wixext/4.0.5
        & $wix --version

    - name: Verify WiX
      run: wix --version

    - name: Restore packages
      shell: pwsh
      run: dotnet restore Redball.v3.sln

    - name: Publish WPF Application
      shell: pwsh
      run: |
        $publishDir = "dist/wpf-publish"
        dotnet publish src/Redball.UI.WPF/Redball.UI.WPF.csproj `
          --configuration Release `
          --output $publishDir `
          --self-contained false `
          --runtime win-x64 `
          -p:PublishSingleFile=false `
          -p:PublishTrimmed=false

        # Move DLLs to dll subfolder (matches WXS structure)
        $dllDir = Join-Path $publishDir "dll"
        New-Item -ItemType Directory -Path $dllDir -Force | Out-Null
        Get-ChildItem -Path $publishDir -Filter "*.dll" |
          Where-Object { $_.Name -ne "Redball.UI.WPF.dll" } |
          ForEach-Object { Move-Item $_.FullName $dllDir -Force }
        Write-Host "Moved DLLs to dll subfolder"

        # Copy Assets
        $assetsSource = "src/Redball.UI.WPF/Assets"
        $assetsDest = Join-Path $publishDir "Assets"
        if (Test-Path $assetsSource) {
          New-Item -ItemType Directory -Path $assetsDest -Force | Out-Null
          Copy-Item -Path "$assetsSource/*" -Destination $assetsDest -Recurse -Force
          Write-Host "Copied Assets to publish directory"
        }

        # Create logs folder placeholder
        $logsDir = Join-Path $publishDir "logs"
        New-Item -ItemType Directory -Path $logsDir -Force | Out-Null
        New-Item -ItemType File -Path (Join-Path $logsDir ".keep") -Force | Out-Null

        Write-Host "Published WPF app to $publishDir"
        Get-ChildItem $publishDir -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

    - name: Build Service
      shell: pwsh
      run: |
        $servicePublishDir = "dist/Redball.Service"
        dotnet publish src/Redball.Service/Redball.Service.csproj `
          --configuration Release `
          --output $servicePublishDir `
          --self-contained true `
          --runtime win-x64 `
          -p:PublishSingleFile=true `
          -p:EnableCompressionInSingleFile=true

        # Copy service files to WPF publish dir for MSI packaging
        $wpfPublishDir = "dist/wpf-publish"
        $serviceFiles = Get-ChildItem -Path $servicePublishDir -File |
          Where-Object { $_.Name -like 'Redball.Service*' }
        foreach ($file in $serviceFiles) {
          Copy-Item $file.FullName $wpfPublishDir -Force
        }
        Write-Host "Service built and copied to publish directory"

    - name: Build Custom Actions DLL
      shell: pwsh
      run: |
        dotnet build installer/Redball.Installer.CustomActions/Redball.Installer.CustomActions.csproj `
          --configuration Release --verbosity minimal
        $dllPath = "installer/Redball.Installer.CustomActions/bin/Release/net472/Redball.Installer.CustomActions.dll"
        if (-not (Test-Path $dllPath)) {
          throw "Custom actions DLL not found: $dllPath"
        }
        Write-Host "Custom Actions DLL built: $dllPath"

    - name: Generate installer assets
      shell: pwsh
      run: |
        # Generate license RTF from LICENSE file
        $licenseText = Get-Content LICENSE -Raw
        $licenseText = $licenseText -replace '(?m)^#+\s*', ''
        $escaped = $licenseText -replace '\\', '\\\\' -replace '\{', '\{' -replace '\}', '\}'
        $escaped = $escaped -replace "`r`n", '\par ' -replace "`n", '\par '
        $rtfContent = "{\rtf1\ansi\deff0{\fonttbl{\f0 Segoe UI;}}\fs20 $escaped}"
        Set-Content -Path "installer/Redball-License.rtf" -Value $rtfContent -Encoding Ascii -NoNewline
        Write-Host "Generated license RTF"

        # Create dev certificate placeholder for MSI
        $cert = New-SelfSignedCertificate -Type CodeSigningCert `
          -Subject "CN=Redball Development, O=ArMaTeC" `
          -CertStoreLocation Cert:\CurrentUser\My `
          -NotAfter (Get-Date).AddYears(1)
        Export-Certificate -Cert $cert -FilePath "dist/RedballDevCert.cer" -Force | Out-Null
        Remove-Item "Cert:\CurrentUser\My\$($cert.Thumbprint)" -Force
        Write-Host "Generated dev certificate for installer"

    - name: Sign EXE
      continue-on-error: true
      shell: pwsh
      env:
        CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
        CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
      run: |
        $exePath = "dist/wpf-publish/Redball.UI.WPF.exe"
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Sort-Object FullName -Descending | Select-Object -First 1
        if (-not $signtool) {
          Write-Warning "signtool.exe not found - skipping EXE signing"
          exit 0
        }
        Write-Host "Using signtool: $($signtool.FullName)"

        if ($env:CODE_SIGNING_CERT) {
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          $certPath = "$env:RUNNER_TEMP\code-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          Write-Host "Signing EXE with production certificate..."
          & $signtool.FullName sign /f $certPath /p $env:CODE_SIGNING_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exePath
          if ($LASTEXITCODE -ne 0) { Write-Warning "EXE signing failed (exit $LASTEXITCODE)" }
          else { Write-Host "EXE signed successfully" }
          Remove-Item $certPath -Force
        } else {
          Write-Host "No CODE_SIGNING_CERT secret found - creating self-signed certificate..."
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Redball Development, O=ArMaTeC" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(1)
          $certPath = "$env:RUNNER_TEMP\dev-signing.pfx"
          $pwd = ConvertTo-SecureString -String "RedballDev2024" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $pwd | Out-Null
          & $signtool.FullName sign /f $certPath /p "RedballDev2024" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exePath
          if ($LASTEXITCODE -ne 0) { Write-Warning "EXE signing failed (exit $LASTEXITCODE)" }
          else { Write-Host "EXE signed with development certificate" }
          Remove-Item $certPath -Force
          Remove-Item "Cert:\CurrentUser\My\$($cert.Thumbprint)" -Force
        }
        $verifyResult = & $signtool.FullName verify /pa $exePath 2>&1
        $verifyResult | Write-Host
        if ($LASTEXITCODE -ne 0) { Write-Host "Note: Signature verification requires trusted cert chain" }

    - name: Debug info
      shell: pwsh
      run: |
        Write-Host "Version: ${{ needs.tag.outputs.version }}"
        Write-Host "=== installer/ ==="
        Get-ChildItem installer/ | Format-Table Name, Length
        Write-Host "=== dist/wpf-publish/ ==="
        Get-ChildItem dist/wpf-publish/ -Recurse | Format-Table FullName, Length
        Write-Host "=== dist/ (top-level) ==="
        Get-ChildItem dist/ -File | Format-Table Name, Length

    - name: Build MSI
      shell: pwsh
      env:
        WIX_OSMF_EULA_ACCEPTED: '1'
      run: |
        $version = "${{ needs.tag.outputs.version }}"
        # WiX requires 4-part version
        $versionParts = $version.Split('.')
        if ($versionParts.Count -eq 3) { $wixVersion = "$version.0" } else { $wixVersion = $version }

        $caPath = "installer/Redball.Installer.CustomActions/bin/Release/net472/Redball.Installer.CustomActions.dll"
        if (-not (Test-Path $caPath)) {
          throw "Custom actions DLL not found: $caPath"
        }

        Write-Host "Building MSI v${version} (WiX version: ${wixVersion})..."
        Push-Location installer
        wix.exe build Redball.v2.wxs `
          -o "../dist/Redball-${version}.msi" `
          -ext WixToolset.UI.wixext `
          -ext WixToolset.Util.wixext `
          -d "ProductVersion=${wixVersion}" `
          -d "CA_PATH=../${caPath}"
        $wixExitCode = $LASTEXITCODE
        Pop-Location

        if ($wixExitCode -ne 0) {
          throw "WiX build failed with exit code $wixExitCode"
        }

        $msiPath = "dist/Redball-${version}.msi"
        if (-not (Test-Path $msiPath)) {
          throw "MSI not found after build: $msiPath"
        }

        Copy-Item $msiPath "dist/Redball.msi" -Force
        $msiInfo = Get-Item $msiPath
        Write-Host "MSI built successfully: $($msiInfo.Name) ($([math]::Round($msiInfo.Length / 1MB, 2)) MB)"

    - name: Sign MSI
      continue-on-error: true
      shell: pwsh
      env:
        CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
        CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
      run: |
        $version = "${{ needs.tag.outputs.version }}"
        $msiPath = "dist/Redball.msi"
        if (-not (Test-Path $msiPath)) {
          Write-Warning "MSI not found at $msiPath - skipping signing"
          exit 0
        }
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Sort-Object FullName -Descending | Select-Object -First 1
        if (-not $signtool) {
          Write-Warning "signtool.exe not found - skipping MSI signing"
          exit 0
        }

        if ($env:CODE_SIGNING_CERT) {
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          $certPath = "$env:RUNNER_TEMP\code-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          Write-Host "Signing MSI with production certificate..."
          & $signtool.FullName sign /f $certPath /p $env:CODE_SIGNING_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 /d "Redball v$version" $msiPath
          if ($LASTEXITCODE -ne 0) { Write-Warning "MSI signing failed (exit $LASTEXITCODE)" }
          else { Write-Host "MSI signed successfully" }
          Remove-Item $certPath -Force
        } else {
          Write-Host "No CODE_SIGNING_CERT secret - creating self-signed certificate for MSI..."
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Redball Development, O=ArMaTeC" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(1)
          $certPath = "$env:RUNNER_TEMP\dev-signing.pfx"
          $pwd = ConvertTo-SecureString -String "RedballDev2024" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $pwd | Out-Null
          & $signtool.FullName sign /f $certPath /p "RedballDev2024" /tr http://timestamp.digicert.com /td sha256 /fd sha256 /d "Redball v$version" $msiPath
          if ($LASTEXITCODE -ne 0) { Write-Warning "MSI signing failed (exit $LASTEXITCODE)" }
          else { Write-Host "MSI signed with development certificate" }
          Remove-Item $certPath -Force
          Remove-Item "Cert:\CurrentUser\My\$($cert.Thumbprint)" -Force
        }
        $verifyResult = & $signtool.FullName verify /pa $msiPath 2>&1
        $verifyResult | Write-Host
        if ($LASTEXITCODE -ne 0) { Write-Host "Note: Signature verification requires trusted cert chain" }

    - name: Generate SHA256 checksums
      shell: pwsh
      run: |
        $version = "${{ needs.tag.outputs.version }}"
        $artifacts = @("dist/Redball-${version}.msi", "dist/Redball.msi")
        $hashLines = @()
        foreach ($artifact in $artifacts) {
          if (Test-Path $artifact) {
            $hash = (Get-FileHash -Path $artifact -Algorithm SHA256).Hash
            $name = Split-Path $artifact -Leaf
            $hashLines += "$hash  $name"
            Write-Host "$name : $hash"
          }
        }
        if ($hashLines.Count -gt 0) {
          $hashContent = ($hashLines -join "`n") + "`n"
          [System.IO.File]::WriteAllText("dist/SHA256SUMS", $hashContent, [System.Text.UTF8Encoding]::new($false))
          Write-Host "Created SHA256SUMS"
        }

    - name: Upload MSI
      id: upload
      uses: actions/upload-artifact@v7
      with:
        name: redball-msi
        path: |
          ./dist/Redball.msi
          ./dist/Redball-*.msi
          ./dist/SHA256SUMS
        retention-days: 7
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.created == 'true' && needs.build.result == 'success'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Download MSI
      uses: actions/download-artifact@v8
      with:
        name: redball-msi
        path: ./release

    - name: Verify MSI exists
      shell: bash
      run: |
        ls -la ./release/
        if [ ! -f "./release/Redball.msi" ]; then
          echo "ERROR: Redball.msi not found"
          exit 1
        fi
        echo "MSI ready for release"

    - name: Generate release notes
      id: notes
      shell: bash
      run: |
        VERSION="${{ needs.tag.outputs.version }}"
        TAG="${{ needs.tag.outputs.tag }}"
        NOTES_FILE="release_notes.md"

        # --- 1. Extract CHANGELOG.md section for this version ---
        CHANGELOG=""
        if [ -f docs/CHANGELOG.md ]; then
          # Grab lines between ## [VERSION] and the next ## header
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, ver)) found=1; next }
            found { print }
          ' docs/CHANGELOG.md)
        fi

        # --- 2. Categorised git log since previous tag ---
        PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
        RANGE="${PREV_TAG:+${PREV_TAG}..HEAD}"
        RANGE="${RANGE:-HEAD}"

        FEATURES=$(git log "$RANGE" --pretty=format:"- %s" --grep="feat" -i 2>/dev/null || true)
        FIXES=$(git log "$RANGE" --pretty=format:"- %s" --grep="fix" -i 2>/dev/null || true)
        OTHER=$(git log "$RANGE" --pretty=format:"- %s" --invert-grep --grep="feat" --grep="fix" -i 2>/dev/null | head -20 || true)

        # --- 3. Assemble release notes ---
        {
          echo "# Redball $TAG"
          echo ""
          if [ -n "$CHANGELOG" ]; then
            echo "## What's New"
            echo "$CHANGELOG"
            echo ""
          fi
          if [ -n "$FEATURES" ]; then
            echo "## Features"
            echo "$FEATURES"
            echo ""
          fi
          if [ -n "$FIXES" ]; then
            echo "## Bug Fixes"
            echo "$FIXES"
            echo ""
          fi
          if [ -n "$OTHER" ]; then
            echo "## Other Changes"
            echo "$OTHER"
            echo ""
          fi
          echo "---"
          echo "*Full changelog: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...$TAG*"
        } > "$NOTES_FILE"

        echo "Generated release notes:"
        cat "$NOTES_FILE"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        body_path: release_notes.md
        files: |
          ./release/Redball.msi
          ./release/Redball-*.msi
          ./release/SHA256SUMS
        generate_release_notes: false
        draft: false
        prerelease: false
