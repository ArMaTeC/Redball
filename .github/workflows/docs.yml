name: Build and Deploy API Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**/*.cs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install DocFX
        run: |
          dotnet tool install --global docfx --version 2.77.0
          docfx --version

      - name: Generate API Documentation
        run: |
          $config = '{"metadata":[{"src":[{"files":["Redball.UI.WPF.csproj"],"cwd":"src/Redball.UI.WPF"}],"dest":"api","namespaceLayout":"flattened"}],"build":{"content":[{"files":["api/**/*.yml"]},{"src":"docs","files":["*.md","toc.yml"]}],"output":"_site","template":["default","modern"]}}'
          $config | Set-Content docfx.json
          docfx metadata docfx.json
          docfx build docfx.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
