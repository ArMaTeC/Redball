name: Greetings

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

env:
  # Opt into Node.js 24 to suppress deprecation warnings until actions are updated
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
          👋 Welcome to Redball!

          Thank you for opening your first issue. To help us assist you better:
          - Include your Windows version and PowerShell version (`$PSVersionTable`)
          - Describe what you were trying to do and what happened instead
          - If it's a bug, check if it exists in the [latest release](https://github.com/${{ github.repository }}/releases)

          A maintainer will review this soon. Thanks for helping improve Redball!
        pr-message: |
          🎉 Welcome and thank you for your first pull request!

          The Redball team appreciates your contribution. Here's what happens next:
          - CI will run tests automatically
          - A maintainer will review your changes
          - You may receive feedback or questions

          Make sure you've:
          - Tested your changes locally
          - Updated relevant documentation if needed
          - Followed existing code style

          Thanks for making Redball better!
