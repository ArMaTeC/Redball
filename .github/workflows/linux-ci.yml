name: Redball Linux CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/Redball.Linux/**'
      - 'scripts/build-linux.sh'
      - '.github/workflows/linux-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/Redball.Linux/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'all'
        type: choice
        options:
          - build
          - dist
          - flatpak
          - deb
          - all

env:
  FORCE_JAVELIN_ACTIONS_TO_NODE24: true

jobs:
  # Quick checks that can run on GitHub-hosted runner
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install linting tools
      run: |
        pip install flake8 pylint black isort mypy

    - name: Run flake8
      run: |
        flake8 src/Redball.Linux/redball --max-line-length=100 --extend-ignore=E203,W503 || true

    - name: Run black check
      run: |
        black --check src/Redball.Linux/redball || true

    - name: Run isort check
      run: |
        isort --check-only src/Redball.Linux/redball || true

  # Build on self-hosted Ubuntu server
  build-self-hosted:
    name: Build on Self-Hosted Ubuntu
    runs-on: self-hosted
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Verify Ubuntu environment
      run: |
        echo "OS: $(lsb_release -ds)"
        echo "Kernel: $(uname -r)"
        echo "Architecture: $(uname -m)"
        which meson || echo "meson not found"
        which ninja || echo "ninja not found"
        python3 --version

    - name: Cache build dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/pip
          ~/.local/share/flatpak
        key: ${{ runner.os }}-build-deps-${{ hashFiles('src/Redball.Linux/**') }}
        restore-keys: |
          ${{ runner.os }}-build-deps-

    - name: Install dependencies (if needed)
      run: |
        # Check if meson is available, if not install deps
        if ! command -v meson &> /dev/null; then
          echo "Installing build dependencies..."
          sudo apt-get update
          sudo apt-get install -y meson ninja-build python3-pip \
            libgtk-4-dev libadwaita-1-dev gir1.2-gtk-4.0 gir1.2-adw-1 \
            desktop-file-utils appstream-util gettext flatpak flatpak-builder
        fi

    - name: Build Redball Linux
      id: build
      run: |
        cd src/Redball.Linux
        
        # Setup build
        meson setup build --prefix=/usr --buildtype=release
        
        # Compile
        ninja -C build
        
        # Run tests if available
        meson test -C build || echo "Some tests may have failed (non-fatal)"
        
        echo "Build completed successfully"

    - name: Create Distribution Package
      if: github.ref == 'refs/heads/main'
      run: |
        cd src/Redball.Linux
        
        # Create dist directory
        mkdir -p dist
        
        # Install to staging area
        DESTDIR=$(pwd)/dist/install ninja -C build install
        
        # Create tarball
        VERSION=$(meson introspect --projectinfo build | grep -o '"version": "[^"]*"' | cut -d'"' -f4)
        cd dist
        tar -czf "redball-${VERSION}-linux-amd64.tar.gz" -C install .
        
        echo "DIST_TARBALL=redball-${VERSION}-linux-amd64.tar.gz" >> $GITHUB_ENV
        echo "VERSION=${VERSION}" >> $GITHUB_ENV

    - name: Build Debian Package
      if: github.ref == 'refs/heads/main'
      run: |
        cd src/Redball.Linux
        
        VERSION=$(meson introspect --projectinfo build | grep -o '"version": "[^"]*"' | cut -d'"' -f4)
        DEB_DIR="dist/deb"
        
        # Create debian structure
        mkdir -p "${DEB_DIR}/DEBIAN"
        
        # Install to debian structure
        DESTDIR="${DEB_DIR}" ninja -C build install
        
        # Create control file
        cat > "${DEB_DIR}/DEBIAN/control" << EOF
        Package: redball
        Version: ${VERSION}
        Section: utils
        Priority: optional
        Architecture: amd64
        Depends: python3 (>= 3.9), python3-gi, gir1.2-gtk-4.0, gir1.2-adw-1
        Maintainer: ArMaTeC <redball@armatec.io>
        Description: Keep your system awake with TypeThing automation
        EOF
        
        # Build package
        dpkg-deb --build "$DEB_DIR" "dist/redball_${VERSION}_amd64.deb"
        
        echo "DEB_PACKAGE=redball_${VERSION}_amd64.deb" >> $GITHUB_ENV

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: redball-linux-build
        path: |
          src/Redball.Linux/dist/*.tar.gz
          src/Redball.Linux/dist/*.deb
        if-no-files-found: warn

    - name: Upload Build Log
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: build-logs
        path: |
          src/Redball.Linux/build/meson-logs/
          src/Redball.Linux/build/meson-private/
        if-no-files-found: ignore

  # Release job - creates GitHub release from self-hosted build
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: redball-linux-build
        path: ./release

    - name: Get version
      id: get_version
      run: |
        VERSION=$(grep -oP 'version\s*:\s*\K[\d.]+' src/Redball.Linux/meson.build)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "TAG=v${VERSION}-linux" >> $GITHUB_OUTPUT

    - name: Check if tag exists
      id: check_tag
      run: |
        if git rev-parse "${{ steps.get_version.outputs.TAG }}" >/dev/null 2>&1; then
          echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
        else
          echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
        fi

    - name: Create Tag
      if: steps.check_tag.outputs.TAG_EXISTS == 'false'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ steps.get_version.outputs.TAG }}" -m "Linux release ${{ steps.get_version.outputs.VERSION }}"
        git push origin "${{ steps.get_version.outputs.TAG }}"

    - name: Generate Release Notes
      run: |
        cat > release_notes.md << 'EOF'
        # Redball for Linux ${{ steps.get_version.outputs.VERSION }}
        
        Native Linux build using GTK4/libadwaita.
        
        ## Installation
        
        ### Debian/Ubuntu (DEB package)
        ```bash
        sudo dpkg -i redball_${{ steps.get_version.outputs.VERSION }}_amd64.deb
        sudo apt-get install -f  # Install dependencies if needed
        ```
        
        ### Generic Linux (tarball)
        ```bash
        tar -xzf redball-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz
        sudo cp -r usr/* /usr/
        sudo glib-compile-schemas /usr/share/glib-2.0/schemas/
        ```
        
        ### Build from source
        ```bash
        cd src/Redball.Linux
        meson setup build
        ninja -C build
        sudo ninja -C build install
        ```
        
        ## Features
        - Keep-awake engine with idle detection
        - TypeThing automatic typing simulation
        - Smart scheduling and automation
        - System tray integration (AppIndicator)
        - Battery-aware operation
        - GNOME/KDE desktop integration
        
        ## Requirements
        - Python 3.9+
        - GTK 4.0+
        - libadwaita 1.0+
        
        ## Notes
        - This is a native Linux build, separate from the Windows version
        - Some features may differ between platforms
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        body_path: release_notes.md
        files: ./release/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
